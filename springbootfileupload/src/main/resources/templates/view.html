<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View File Content</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
        }
        nav {
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 10px 20px;
        }
        nav a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
            font-size: 16px;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333333;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .table th, .table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        .table th {
            background-color: #f2f2f2;
        }
        .table tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .table tr:hover {
            background-color: #f1f1f1;
        }
        .error {
            color: red;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #ffe6e6;
            border: 1px solid #ffcccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <nav>
        <a th:href="@{/}" class="btn">Back to Upload Files</a>
    </nav>
    <div class="container">
        <h1>File Content</h1>
        <div th:if="${error}" class="error" th:text="${error}"></div>
        
        <table class="table">
            <thead>
                <tr>
                    <th>Column Name</th>
                    <th>EmailId</th>
                    <th>Phone Number</th>
                    <!-- Add more headers as needed -->
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry : ${tempTableEntries}">
                    <td th:text="${entry.columnName}">Column Name</td>
                    <td th:text="${entry.EmailId}">EmailId</td>
                    <td th:text="${entry.phoneNumber}">Phone Number</td>
                    <!-- Add more columns as needed -->
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
